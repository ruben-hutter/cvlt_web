name: CI
on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PAYLOAD_SECRET: ci-placeholder-secret
      DATABASE_URI: file:./ci.db
      NEXT_PUBLIC_SERVER_URL: https://cvlt.ch
      SMTP_USER: ci@placeholder.local
      SMTP_PASS: ci-placeholder
      SMTP_FROM: ci@placeholder.local
      MEMBERSHIP_EMAIL: ci@placeholder.local
      SHOP_EMAIL: ci@placeholder.local
      CONTACT_EMAIL: ci@placeholder.local
      SHOP_PAYLINK_URL: https://pay.placeholder.local/ci
      SHOP_ORDER_TOKEN_SECRET: ci-placeholder-secret
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build (generates importMap + types)
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --audit-level=critical || true
